interface:
  display_name: "Figma Implement Design"
  short_description: "Implementacao de frontend 1:1 a partir de design do Figma"
  icon_small: "./assets/figma-small.svg"
  icon_large: "./assets/figma.png"
  default_prompt: "Implemente o design do Figma em codigo de producao com fidelidade visual de 1:1, seguindo o fluxo completo (design context, variable defs, screenshot, assets, traducao para convencoes do projeto e validacao final). Se houver falha de MCP, resolva setup/diagnostico via skill figma e retome a implementacao."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
